spring:
    application:
        name: contratoquery
    profiles:
        active: dev
    datasource:
        url: jdbc:postgresql://localhost:5432/${DB_NAME}
        username: ${DB_USER_NAME}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: none
        show-sql: false

server:
    port: 8081
