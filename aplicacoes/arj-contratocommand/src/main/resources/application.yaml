spring:
    application:
        name: contratocommand
    datasource:
        url: jdbc:postgresql://localhost:5432/${DB_NAME}
        username: ${DB_USER_NAME}
        password: ${DB_PASSWORD}
        hikari:
            maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
            minimum-idle: ${DB_POOL_MIN_IDLE:2}
            connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
            idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
            max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}
    jpa:
        hibernate:
            ddl-auto: update
#        properties:
#            hibernate:
#                dialect: org.hibernate.dialect.PostgreSQLDialect
#               -> nao precisa especificar o dialeto nas versoes mais recentes do jpa
        open-in-view: false